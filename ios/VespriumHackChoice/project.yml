name: VespriumHackChoice
options:
  bundleIdPrefix: com.vesprium
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  ASKCoordinator:
    url: https://github.com/skorulis/ASKCoordinator
    branch: main
  ASKCore:
    url: https://github.com/skorulis/ASKCore
    branch: main
  Knit:
    url: https://github.com/cashapp/knit
    branch: main
  SwiftLintPlugins:
    url: https://github.com/SimplyDanny/SwiftLintPlugins
    from: 0.60.0

targets:
  VespriumHackChoice:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VespriumHackChoice
      - path: knitconfig.json
        buildPhase: resources
        group: Config
    dependencies:
      - package: ASKCoordinator
        product: ASKCoordinator
      - package: ASKCore
        product: ASKCore
      - package: Knit
        product: Knit
      - package: Knit
        product: KnitMacros
    buildToolPlugins:
      - plugin: SwiftLintBuildToolPlugin
        package: SwiftLintPlugins
      - plugin: KnitBuildPlugin
        package: Knit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vesprium.VespriumHackChoice
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VespriumHackChoice
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    resources:
      - path: VespriumHackChoice/PrivacyInfo.xcprivacy

  VespriumHackChoiceUnitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VespriumHackChoiceUnitTests
    dependencies:
      - target: VespriumHackChoice
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

schemes:
  VespriumHackChoice:
    build:
      targets:
        VespriumHackChoice: all
        VespriumHackChoiceUnitTests: [test]
    test:
      targets:
        - VespriumHackChoiceUnitTests
